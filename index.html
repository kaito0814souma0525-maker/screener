<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>テクニカル・スクリーナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020817;color:#e2e8f0;font-family:'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif;min-height:100vh}
.header{background:linear-gradient(180deg,#0f172a,#020817);border-bottom:1px solid #1e293b;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:800;color:#f1f5f9}.header h1 span{color:#ef4444}
.header small{font-size:11px;color:#475569;display:block;margin-top:2px}
.hit-count{color:#94a3b8;font-size:12px}
.tabs{display:flex;border-bottom:1px solid #1e293b;background:#0a0f1e}
.tab{padding:11px 16px;font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;color:#475569;border-bottom:2px solid transparent}
.tab.active{color:#ef4444;border-bottom:2px solid #ef4444}
.content{max-width:960px;margin:0 auto;padding:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px}
.card h3{font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:10px}
label{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;font-size:13px;color:#cbd5e1}
input[type=checkbox]{accent-color:#ef4444;width:15px;height:15px}
.lbl{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;display:block;margin-bottom:6px}
select,input[type=number]{background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:6px 10px;font-size:13px;width:100%;outline:none}
.btn{background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:700;font-size:14px;cursor:pointer;display:block;margin:20px auto 0}
.summary{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:8px 14px;min-width:90px}
.stat .slabel{font-size:10px;color:#64748b;margin-bottom:2px}
.stat .svalue{font-size:18px;font-weight:800}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 8px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;color:#64748b;font-weight:600}
th.active{color:#ef4444}
tr.odd{background:#070d1a}tr.even{background:#0a1121}tr.selected{background:#1e293b!important}
tr:not(.header-row){cursor:pointer}
td{padding:8px 8px}
.up{color:#ef4444;font-weight:700}.dn{color:#3b82f6;font-weight:700}
.dot-on{color:#10b981;font-size:14px}.dot-off{color:#334155;font-size:14px}
.detail{margin-top:16px;background:#0f172a;border:1px solid #ef4444;border-radius:12px;padding:16px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.detail-item{background:#1e293b;border-radius:8px;padding:8px 10px}
.detail-item .dlabel{font-size:10px;color:#475569;margin-bottom:2px}
.detail-item .dvalue{font-size:13px;font-weight:700}
.ma-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#1e293b;border-radius:8px;padding:10px}
.ma-item{display:flex;align-items:center;gap:6px;font-size:11px}
.empty{text-align:center;padding:60px 0;color:#475569}
.rsi-bar{display:flex;align-items:center;gap:4px}
.rsi-track{width:44px;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.rsi-fill{height:100%;border-radius:3px}
.hidden{display:none}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>

  <button class="tab" onclick="showTab('results')">📊 結果</button>
</div>
<div class="content">
  <div id="tab-conditions">
    <div class="grid">
      <div class="card"><h3><span style="color:#ef4444">●</span> 日足 移動平均線</h3>
        <label><input type="checkbox" id="nikkyMA25"> MA25 上方</label>
        <label><input type="checkbox" id="nikkyMA75"> MA75 上方</label>
      </div>
      <div class="card"><h3><span style="color:#f97316">●</span> 週足 移動平均線</h3>
        <label><input type="checkbox" id="weekMA25"> 週足MA25 上方</label>
        <label><input type="checkbox" id="weekMA75"> 週足MA75 上方</label>
      </div>
      <div class="card"><h3><span style="color:#fbbf24">●</span> 月足 移動平均線</h3>
        <label><input type="checkbox" id="monthMA12"> 月足MA12 上方</label>
        <label><input type="checkbox" id="monthMA24"> 月足MA24 上方</label>
      </div>
      <div class="card"><h3><span style="color:#a78bfa">●</span> ボリンジャーバンド</h3>
        <span class="lbl">σ ゾーン</span>
        <select id="bbZone">
          <option value="none">指定なし</option>
          <option value="中〜+1σ">中心線〜+1σ</option>

          <option value="-1〜-2σ">-1σ〜-2σ</option>
          <option value="-2σ超">-2σ超（売られすぎ）</option>
        </select>
      </div>
      <div class="card"><h3><span style="color:#10b981">●</span> RSI（14日）</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div><span class="lbl">下限</span><input type="number" id="rsiMin" value="40" min="0" max="100"></div>
          <div><span class="lbl">上限</span><input type="number" id="rsiMax" value="75" min="0" max="100"></div>
        </div>
      </div>
      <div class="card"><h3><span style="color:#8b5cf6">●</span> その他</h3>
        <label><input type="checkbox" id="macdPositive"> MACD ゼロ線以上</label>
        <span class="lbl" style="margin-top:8px">前日比（%）範囲</span>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <input type="number" id="changeMin" value="-10" step="0.5">
          <input type="number" id="changeMax" value="10" step="0.5">
        </div>
      </div>
    </div>
    <button class="btn" onclick="runScreen()">🔍 スクリーニング実行</button>
  </div>
  <div id="tab-results" class="hidden">
    <div class="summary" id="summary"></div>
    <div id="results-body"></div>
  </div>
</div>

let sortKey="前日比%",sortDir=-1,selectedCode=null;
function showTab(t){
  document.getElementById("tab-conditions").classList.toggle("hidden",t!=="conditions");
  document.getElementById("tab-results").classList.toggle("hidden",t!=="results");
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",(i===0&&t==="conditions")||(i===1&&t==="results")));
}
function g(id){return document.getElementById(id)}
function getFiltered(){
  return DATA.filter(s=>{
    if(g("nikkyMA25").checked&&s["日足MA25上方"]!==1)return false;
    if(g("nikkyMA75").checked&&s["日足MA75上方"]!==1)return false;
    if(g("weekMA25").checked&&s["週足MA25上方"]!==1)return false;
    if(g("weekMA75").checked&&s["週足MA75上方"]!==1)return false;
    if(g("monthMA12").checked&&s["月足MA12上方"]!==1)return false;
    if(g("monthMA24").checked&&s["月足MA24上方"]!==1)return false;
    const bb=g("bbZone").value;
    if(bb!=="none"&&s["BB位置"]!==bb)return false;
    if(s["RSI14"]<+g("rsiMin").value||s["RSI14"]>+g("rsiMax").value)return false;
    if(g("macdPositive").checked&&s["MACD"]<=0)return false;
    if(s["前日比%"]<+g("changeMin").value||s["前日比%"]>+g("changeMax").value)return false;
    return true;
  }).sort((a,b)=>{return(a[sortKey]>b[sortKey]?1:-1)*sortDir;});
}
function fmt(n){return Number(n).toLocaleString("ja-JP",{maximumFractionDigits:0})}
function dot(on){return`<span class="${on?"dot-on":"dot-off"}">${on?"●":"○"}</span>`}
function rsiBar(v){
  const c=v>70?"#ef4444":v<30?"#3b82f6":"#10b981";
  return`<div class="rsi-bar"><div class="rsi-track"><div class="rsi-fill" style="width:${Math.min(v,100)}%;background:${c}"></div></div><span style="font-size:11px;color:${c};font-weight:600;min-width:24px">${v}</span></div>`;
}
function bbColor(pos){
  const m={"+2σ超":"#f97316","+1〜+2σ":"#ef4444","中〜+1σ":"#fb7185","中〜-1σ":"#94a3b8","-1〜-2σ":"#3b82f6","-2σ超":"#6366f1"};
  return`<span style="color:${m[pos]||"#475569"};font-weight:700;font-size:11px">${pos||"—"}</span>`;
}
function runScreen(){
  showTab("results");
  const filtered=getFiltered();
  g("hitCount").textContent=filtered.length+" / "+DATA.length+" 銘柄ヒット";
  const avgRsi=filtered.length?(filtered.reduce((a,s)=>a+s["RSI14"],0)/filtered.length).toFixed(1):"—";
  const avgChg=filtered.length?(filtered.reduce((a,s)=>a+s["前日比%"],0)/filtered.length).toFixed(2):"—";
  g("summary").innerHTML=[
    ["ヒット",filtered.length+"銘柄","#ef4444"],
    ["対象",DATA.length+"銘柄","#a78bfa"],
    ["平均RSI",avgRsi,"#10b981"],
    ["平均変化率",filtered.length?avgChg+"%":"—","#38bdf8"],
  ].map(([l,v,c])=>`<div class="stat"><div class="slabel">${l}</div><div class="svalue" style="color:${c}">${v}</div></div>`).join("");
  if(filtered.length===0){
    g("results-body").innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:12px">📭</div><div>条件に合致する銘柄がありません</div></div>`;
    return;
  }
  const si=(k)=>k===sortKey?(sortDir===-1?" ↓":" ↑"):"";
  const headers=[["コード","コード"],["株価","株価"],["前日比%","前日比%"],["RSI14","RSI"],["MACD","MACD"]];
  let html=`<div style="overflow-x:auto"><table><thead><tr class="header-row">
    ${headers.map(([k,l])=>`<th class="${k===sortKey?"active":""}" onclick="setSort('${k}')">${l}${si(k)}</th>`).join("")}
    <th>BB</th>
    <th style="color:#ef4444">日MA<br><span style="font-size:10px;color:#475569">25 75</span></th>
    <th style="color:#f97316">週MA<br><span style="font-size:10px;color:#475569">25 75</span></th>
    <th style="color:#fbbf24">月MA<br><span style="font-size:10px;color:#475569">12 24</span></th>
  </tr></thead><tbody>`;
  filtered.forEach((s,i)=>{
    const chg=s["前日比%"],macd=s["MACD"],sel=s["コード"]===selectedCode;
    html+=`<tr class="${sel?"selected":i%2===0?"odd":"even"}" onclick="selectRow('${s["コード"]}')">
      <td style="color:#94a3b8;font-weight:600">${s["コード"]}</td>
      <td style="color:#f1f5f9;font-weight:700">¥${fmt(s["株価"])}</td>
      <td class="${chg>=0?"up":"dn"}">${chg>=0?"+":""}${chg.toFixed(2)}%</td>
      <td>${rsiBar(s["RSI14"])}</td>
      <td style="color:${macd>=0?"#10b981":"#f43f5e"};font-weight:600">${macd>=0?"+":""}${macd.toFixed(1)}</td>
      <td>${bbColor(s["BB位置"])}</td>
      <td>${dot(s["日足MA25上方"])}${dot(s["日足MA75上方"])}</td>
      <td>${dot(s["週足MA25上方"])}${dot(s["週足MA75上方"])}</td>
      <td>${dot(s["月足MA12上方"])}${dot(s["月足MA24上方"])}</td>
    </tr>`;
    if(sel)html+=`<tr class="selected"><td colspan="9">${renderDetail(s)}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  g("results-body").innerHTML=html;
}
function renderDetail(s){
  const chg=s["前日比%"];
  return`<div class="detail">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:17px;font-weight:800;color:#f1f5f9">${s["コード"]}</span>
      <button onclick="selectRow('${s["コード"]}')" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px">✕</button>
    </div>
    <div class="detail-grid">
      ${[["株価","¥"+fmt(s["株価"]),"#f1f5f9"],["前日比",(chg>=0?"+":"")+chg.toFixed(2)+"%",chg>=0?"#ef4444":"#3b82f6"],["RSI14",s["RSI14"],"#10b981"],["+1σ","¥"+fmt(s["BB_U1"]),"#fb7185"],["MA25","¥"+fmt(s["MA25"]),"#fbbf24"],["-1σ","¥"+fmt(s["BB_L1"]),"#60a5fa"]].map(([l,v,c])=>`<div class="detail-item"><div class="dlabel">${l}</div><div class="dvalue" style="color:${c}">${v}</div></div>`).join("")}
    </div>
    <div class="ma-grid">
      <div style="font-size:11px;color:#64748b;font-weight:600;grid-column:1/-1;margin-bottom:4px">MA上方チェック</div>
      ${[["日足MA25",s["日足MA25上方"],"#ef4444"],["日足MA75",s["日足MA75上方"],"#ef4444"],["週足MA25",s["週足MA25上方"],"#f97316"],["週足MA75",s["週足MA75上方"],"#f97316"],["月足MA12",s["月足MA12上方"],"#fbbf24"],["月足MA24",s["月足MA24上方"],"#fbbf24"]].map(([l,v,c])=>`<div class="ma-item"><span style="color:${v?c:"#334155"};font-size:14px">${v?"●":"○"}</span><span style="color:${v?"#e2e8f0":"#475569"};font-size:11px">${l}</span></div>`).join("")}
    </div>
  </div>`;
}
function selectRow(code){selectedCode=selectedCode===code?null:code;runScreen();}
function setSort(key){if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=-1;}runScreen();}
</script>
